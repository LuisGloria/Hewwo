<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noai, noimageai, nosnippet">
<title>404 - Not Found</title>
<link rel="icon" type="image/png" href="img/favicon.png">

<style>
@font-face {
  font-family: 'LDRFont';
  src: url('/Hewwo/fonts/LDRFnt.ttf') format('truetype');
}

body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'LDRFont', monospace;
  color: white;
}

.bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: url("/Hewwo/img/404.gif") no-repeat center center;
  background-size: cover;
  image-rendering: pixelated;
  z-index: 2;
}

.static {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url("/Hewwo/img/tv_noise.gif");
  opacity: 0.18;
  mix-blend-mode: screen;
  z-index: 1;
  pointer-events: none;
}

.lost {
  position: fixed;
  top: 70px;
  right: 60px;
  font-size: 26px;
  z-index: 3;
  text-shadow: 0 0 8px black;
}

.big404 {
  position: fixed;
  bottom: 10px;
  left: 750px;
  font-size: 160px;
  z-index: 3;
  cursor: text;
  text-shadow: 0 0 15px black;
  position: fixed;
}

/* duplicate layers */
.big404::before,
.big404::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  overflow: hidden;
  background: transparent;
}

/* top glitch slice */
.big404::before {
  clip-path: inset(0 0 65% 0);
  transform: translateX(-6px);
  animation: glitchTop 0.05s infinite linear alternate-reverse;
}

/* bottom glitch slice */
.big404::after {
  clip-path: inset(65% 0 0 0);
  transform: translateX(6px);
  animation: glitchBottom 0.05s infinite linear alternate-reverse;
}

@keyframes glitchTop {
  0%   { transform: translateX(-6px); }
  50%  { transform: translateX(6px); }
  100% { transform: translateX(-2px); }
}

@keyframes glitchBottom {
  0%   { transform: translateX(6px); }
  50%  { transform: translateX(-6px); }
  100% { transform: translateX(2px); }
}

.credit {
  position: fixed;
  top: 110px;
  right: 60px;
  font-size: 18px;
  z-index: 3;
  text-shadow: 0 0 8px black;
}

.credit a {
  color: #0000FF;
  text-decoration: none;
}

.credit a:hover {
  text-decoration: underline;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="static"></div>

<div class="lost">You're lost, aren't ya?</div>

<div class="credit">
  Art made by
  <a href="https://bsky.app/profile/idaawz.bsky.social" target="_blank">
    <img src="/Hewwo/img/indiewtrmk.png" alt="Indie watermark" style="vertical-align: middle;">
  </a>
</div>

<div class="big404" contenteditable="true" data-text="404">
  404
</div>

</body>
</html>
